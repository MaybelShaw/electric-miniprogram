name: electric-miniprogram

services:
  db:
    image: postgres:17-alpine
    env_file:
      # 默认读取服务器路径；本地可通过 ELECTRIC_ENV_FILE 覆盖
      - ${ELECTRIC_ENV_FILE:-/etc/electric-miniprogram/.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.prod
    working_dir: /app
    volumes:
      - staticfiles:/app/backend/staticfiles
      - /var/lib/electric-miniprogram/preprod-media:/app/backend/media
      - /etc/electric-miniprogram/certs/wechatpay:/etc/electric-miniprogram/certs/wechatpay:ro
    env_file:
      # 默认读取服务器路径；本地可通过 ELECTRIC_ENV_FILE 覆盖
      - ${ELECTRIC_ENV_FILE:-/etc/electric-miniprogram/.env.production}
    environment:
      - ALLOWED_HOSTS=www.qxelectric.cn,qxelectric.cn,cdn.qxelectric.cn,origin.qxelectric.cn,qxelectric.ypfq.cn,localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://www.qxelectric.cn,http://qxelectric.cn
      - ORDER_PAYMENT_TIMEOUT_MINUTES=1440
      - SECURE_SSL_REDIRECT=false
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c ".venv/bin/python manage.py migrate &&
                .venv/bin/python manage.py collectstatic --noinput &&
                exec .venv/bin/gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 90 --access-logfile - --error-logfile -"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      backend:
        condition: service_started
      merchant-build:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - merchant_dist:/usr/share/nginx/html:ro
      - staticfiles:/var/www/backend/backend/staticfiles:ro
      - /var/lib/electric-miniprogram/preprod-media:/var/www/backend/backend/media:ro
      - ../deploy/nginx.preprod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  merchant-build:
    build:
      context: ..
      dockerfile: docker/Dockerfile.merchant.prod
    volumes:
      - merchant_dist:/dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /dist/index.html"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles:
  merchant_dist:
