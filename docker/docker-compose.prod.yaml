name: electric-miniprogram

services:
  db:
    image: postgres:17-alpine
    env_file:
      # 默认读取服务器路径；本地可通过 ELECTRIC_ENV_FILE 覆盖
      - ${ELECTRIC_ENV_FILE:-/etc/electric-miniprogram/.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.prod
    working_dir: /app
    volumes:
      - staticfiles:/app/backend/staticfiles
      - ../backend/backend/media:/app/backend/media
      - /etc/electric-miniprogram/certs/wechatpay:/etc/electric-miniprogram/certs/wechatpay:ro
    env_file:
      # 默认读取服务器路径；本地可通过 ELECTRIC_ENV_FILE 覆盖
      - ${ELECTRIC_ENV_FILE:-/etc/electric-miniprogram/.env.production}
    environment:
      - ALLOWED_HOSTS=www.qxelectric.cn,qxelectric.cn,cdn.qxelectric.cn,origin.qxelectric.cn
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c ".venv/bin/python manage.py migrate &&
                .venv/bin/python manage.py collectstatic --noinput &&
                exec .venv/bin/gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 90 --access-logfile - --error-logfile -"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c 'import os,urllib.request; raw=os.getenv("ALLOWED_HOSTS",""); hosts=[h.strip() for h in raw.split(",") if h.strip()]; host=("127.0.0.1" if "*" in hosts else (hosts[0].lstrip(".") if hosts else "localhost")); req=urllib.request.Request("http://127.0.0.1:8000/healthz", headers={"Host": host, "X-Forwarded-Proto": "https"}); urllib.request.urlopen(req, timeout=2).read()'
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx.prod
    depends_on:
      backend:
        condition: service_healthy
      merchant-build:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - merchant_dist:/usr/share/nginx/html:ro
      - staticfiles:/var/www/backend/backend/staticfiles:ro
      - ../backend/backend/media:/var/www/backend/backend/media:ro
      # 证书请放在宿主机 /etc/electric-miniprogram/certs/nginx 下
      - /etc/electric-miniprogram/certs/nginx:/etc/nginx/certs:ro
    restart: unless-stopped

  merchant-build:
    build:
      context: ..
      dockerfile: docker/Dockerfile.merchant.prod
    volumes:
      - merchant_dist:/dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /dist/index.html"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles:
  merchant_dist:
